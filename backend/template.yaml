AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  opita-landing — Static S3 + CloudFront + API Gateway + Lambda contact form via SES

Parameters:
  DomainName:
    Type: String
    Default: opitacode.com
    Description: Root domain for the landing page
  HostedZoneId:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /opita-landing/hosted-zone-id
    Description: Route53 Hosted Zone ID (stored in SSM Parameter Store)
  AcmCertificateArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /opita-landing/acm-cert-arn
    Description: ACM certificate ARN in us-east-1 (stored in SSM Parameter Store)
  OwnerEmail:
    Type: String
    Default: owner@opitacode.com
    Description: Email address that receives contact form submissions via SES

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 128
    Architectures:
      - arm64
    Environment:
      Variables:
        OWNER_EMAIL: !Ref OwnerEmail

Resources:
  # ── S3 Bucket ──
  LandingBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: 404.html

  LandingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LandingBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${LandingBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ── CloudFront Distribution ──
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        PriceClass: PriceClass_100
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultRootObject: index.html
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt LandingBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          DefaultTTL: 86400
          MaxTTL: 604800
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none

  # ── Route53 RecordSet ──
  DnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront's hosted zone ID (global)
        DNSName: !GetAtt CloudFrontDistribution.DomainName

  # ── API Gateway ──
  ContactApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: opita-landing-contact-api
      StageName: prod
      EndpointConfiguration: REGIONAL
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'https://opitacode.com'"
        MaxAge: "'86400'"

  # ── Lambda Function ──
  ContactFormFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: contact-form.handler
      Description: Processes contact form submissions and sends via SES
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        ContactEndpoint:
          Type: Api
          Properties:
            RestApiId: !Ref ContactApi
            Path: /contact
            Method: POST

Outputs:
  BucketName:
    Description: S3 bucket name for static files
    Value: !Ref LandingBucket
  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !GetAtt CloudFrontDistribution.DomainName
  ContactApiEndpoint:
    Description: API Gateway endpoint for contact form
    Value: !Sub "https://${ContactApi}.execute-api.${AWS::Region}.amazonaws.com/prod/contact"
